<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="MedBlock — Secure Health Records on Blockchain" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
      integrity="sha512-SnH5WK+bZxgPHs44uWIX+LLJAJ9/2PkPKZ5QiAj6Ta86w+fsb2TkcmfRyVX3pBnMFcV7oQPJkl9QevSCWr3W6A=="

      referrerpolicy="no-referrer"

  <body>
    <!-- ENHANCEMENT: Skip-to-content link for keyboard users -->
    <a
      href="#main-login"
      class="skip-link"
      style="
        position: absolute;
        top: -40px;
        left: 8px;
        padding: 8px 14px;
        background: #0ea5e9;
        color: #fff;
        border-radius: 6px;
        text-decoration: none;
        font-size: 0.85rem;
        z-index: 9999;
        transition: top 0.2s;
      "
      onfocus="this.style.top='8px'"
      onblur="this.style.top='-40px'"
      >Skip to sign in form</a
    >
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
